apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: jenkins-tls
  namespace: jenkins
spec:
  secretName: jenkins-tls
  issuerRef:
    # Use your existing ClusterIssuer - adjust name to match your setup
    name: vault-issuer          # change to your actual ClusterIssuer name
    kind: ClusterIssuer
  dnsNames:
    - jenkins.naidu72.info
  duration: 2160h       # 90 days
  renewBefore: 360h     # renew 15 days before expiry
