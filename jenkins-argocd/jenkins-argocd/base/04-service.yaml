---
# HTTP service - used by Ingress
apiVersion: v1
kind: Service
metadata:
  name: jenkins
  namespace: jenkins
  labels:
    app: jenkins
spec:
  type: ClusterIP
  selector:
    app: jenkins
  ports:
    - name: http
      port: 8080
      targetPort: 8080

---
# JNLP agent service - agents connect on port 50000
# NodePort so agents running outside cluster can also connect if needed
apiVersion: v1
kind: Service
metadata:
  name: jenkins-agent
  namespace: jenkins
  labels:
    app: jenkins
spec:
  type: ClusterIP          # inside k3s, pod agents use ClusterIP directly
  selector:
    app: jenkins
  ports:
    - name: jnlp
      port: 50000
      targetPort: 50000
