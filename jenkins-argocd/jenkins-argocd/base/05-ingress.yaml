apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jenkins
  namespace: jenkins
  labels:
    app: jenkins
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    # Required for Jenkins behind a reverse proxy
    nginx.ingress.kubernetes.io/proxy-redirect-from: "http://jenkins.naidu72.info/jenkins/"
    nginx.ingress.kubernetes.io/proxy-redirect-to: "/jenkins/"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Forwarded-Proto: https";
spec:
  ingressClassName: nginx
  rules:
    - host: jenkins.naidu72.info
      http:
        paths:
          - path: /jenkins
            pathType: Prefix
            backend:
              service:
                name: jenkins
                port:
                  number: 8080
  # TLS via cert-manager (uses your existing Vault CA setup)
  tls:
    - hosts:
        - jenkins.naidu72.info
      secretName: jenkins-tls
