apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ghcr-pull-secret
  namespace: jenkins
  labels:
    app: jenkins
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: vault-backend          # your existing ClusterSecretStore name
    kind: ClusterSecretStore     # adjust to SecretStore if yours is namespace-scoped

  target:
    name: ghcr-pull-secret       # name of the k8s Secret to create
    type: kubernetes.io/dockerconfigjson
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        # ESO renders this as a valid dockerconfigjson using the Vault values
        .dockerconfigjson: |
          {
            "auths": {
              "ghcr.io": {
                "username": "{{ .username }}",
                "password": "{{ .password }}",
                "auth": "{{ printf "%s:%s" .username .password | b64enc }}"
              }
            }
          }

  data:
    - secretKey: username
      remoteRef:
        key: secret/ghcr/credentials   # Vault path
        property: username              # field name in Vault

    - secretKey: password
      remoteRef:
        key: secret/ghcr/credentials
        property: password
