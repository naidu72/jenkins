apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ghcr-pull-secret
  namespace: jenkins
  labels:
    app: jenkins
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: vault-backend-secret   # points at the "secret" KV mount
    kind: ClusterSecretStore

  target:
    name: ghcr-pull-secret       # name of the k8s Secret to create
    type: kubernetes.io/dockerconfigjson
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        # ESO renders this as a valid dockerconfigjson using the Vault values
        .dockerconfigjson: |
          {
            "auths": {
              "ghcr.io": {
                "username": "{{ .username }}",
                "password": "{{ .token }}",
                "auth": "{{ printf "%s:%s" .username .token | b64enc }}"
              }
            }
          }

  data:
    - secretKey: username
      remoteRef:
        key: ghcr/credentials   # Vault path (relative to "secret" mount)
        property: username

    - secretKey: token
      remoteRef:
        key: ghcr/credentials
        property: token
