apiVersion: v1
kind: ConfigMap
metadata:
  name: jenkins-casc
  namespace: jenkins
  labels:
    app: jenkins
data:
  jenkins.yaml: |
    jenkins:
      systemMessage: "Jenkins on k3s - naidu72 homelab"
      numExecutors: 0              # IMPORTANT: 0 executors on controller — all builds run on agents
      mode: EXCLUSIVE

      clouds:
        - kubernetes:
            name: "k3s-cloud"
            serverUrl: ""          # empty = use in-cluster config (ServiceAccount token)
            namespace: "jenkins"   # agent pods created in jenkins namespace
            jenkinsUrl: "http://jenkins.jenkins.svc.cluster.local:8080/jenkins"
            jenkinsTunnel: "jenkins-agent.jenkins.svc.cluster.local:50000"
            connectTimeout: 30
            readTimeout: 30
            containerCapStr: "10"  # max concurrent agent pods
            podRetention: "never"  # always delete pod after build

            templates:
              # Default agent template - base for all pipelines
              - name: "default-agent"
                label: "k3s-agent"
                nodeUsageMode: NORMAL
                containers:
                  - name: jnlp
                    image: "jenkins/inbound-agent:latest-jdk17"
                    alwaysPullImage: false
                    workingDir: "/home/jenkins/agent"
                    ttyEnabled: true
                    resourceRequestCpu: "200m"
                    resourceRequestMemory: "256Mi"
                    resourceLimitCpu: "500m"
                    resourceLimitMemory: "512Mi"

              # Maven agent template
              - name: "maven-agent"
                label: "maven"
                containers:
                  - name: jnlp
                    image: "jenkins/inbound-agent:latest-jdk17"
                    workingDir: "/home/jenkins/agent"
                    ttyEnabled: true
                    resourceRequestCpu: "200m"
                    resourceRequestMemory: "256Mi"
                  - name: maven
                    image: "maven:3.9-eclipse-temurin-17"
                    command: "sleep"
                    args: "infinity"
                    ttyEnabled: true
                    resourceRequestCpu: "500m"
                    resourceRequestMemory: "512Mi"
                    resourceLimitCpu: "1000m"
                    resourceLimitMemory: "1Gi"

              # Docker-in-Docker agent template (for building images)
              - name: "docker-agent"
                label: "docker"
                containers:
                  - name: jnlp
                    image: "jenkins/inbound-agent:latest-jdk17"
                    workingDir: "/home/jenkins/agent"
                    ttyEnabled: true
                    resourceRequestCpu: "200m"
                    resourceRequestMemory: "256Mi"
                  - name: docker
                    image: "docker:24-dind"
                    command: "sleep"
                    args: "infinity"
                    ttyEnabled: true
                    privileged: true        # required for DinD
                    resourceRequestCpu: "500m"
                    resourceRequestMemory: "512Mi"
                    resourceLimitCpu: "1000m"
                    resourceLimitMemory: "1Gi"
                    envVars:
                      - envVar:
                          key: "DOCKER_TLS_CERTDIR"
                          value: ""

    unclassified:
      globalJobDslSecurityConfiguration:
        useScriptSecurity: false
      location:
        url: "https://jenkins.naidu72.info/jenkins/"
        adminAddress: "admin@naidu72.info"
