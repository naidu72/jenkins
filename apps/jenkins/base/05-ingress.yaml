apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jenkins
  namespace: jenkins
  labels:
    app: jenkins
  annotations:
    strrl.dev/cloudflare-tunnel-enabled: "true"
spec:
  ingressClassName: cloudflare-tunnel
  rules:
    - host: jenkins.naidu72.info
      http:
        paths:
          - path: /jenkins
            pathType: Prefix
            backend:
              service:
                name: jenkins
                port:
                  number: 8080
