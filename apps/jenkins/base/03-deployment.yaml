apiVersion: apps/v1
kind: Deployment
metadata:
  name: jenkins
  namespace: jenkins
  labels:
    app: jenkins
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jenkins
  template:
    metadata:
      labels:
        app: jenkins
    spec:
      serviceAccountName: jenkins
      imagePullSecrets:
        - name: ghcr-pull-secret 

      # Required: Jenkins home dir needs to be writable by uid 1000
      securityContext:
        fsGroup: 1000
        runAsUser: 1000

      initContainers:
        # Fix permissions on the PVC mount before Jenkins starts
        - name: init-permissions
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 1000:1000 /var/jenkins_home"]
          securityContext:
            runAsUser: 0          # run as root just for chown
          volumeMounts:
            - name: jenkins-data
              mountPath: /var/jenkins_home

      containers:
        - name: jenkins
          image: ghcr.io/naidu72/jenkins:lts   # LTS tag, JDK17 baked in
          ports:
            - name: http
              containerPort: 8080
            - name: jnlp              # agent connection port
              containerPort: 50000
          env:
            - name: JAVA_OPTS
              value: >-
                -Djenkins.install.runSetupWizard=false
                -Dhudson.security.csrf.GlobalCrumbIssuerConfiguration.DISABLE_CSRF_PROTECTION=false
            - name: JENKINS_OPTS
              value: "--prefix=/jenkins"   # optional path prefix - remove if using root path
            # JCasC - tells Jenkins where to find config YAML
            - name: CASC_JENKINS_CONFIG
              value: "/var/jenkins_casc/jenkins.yaml"
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1500m"
              memory: "2Gi"
          volumeMounts:
            - name: jenkins-data
              mountPath: /var/jenkins_home
            - name: jenkins-casc
              mountPath: /var/jenkins_casc
              readOnly: true
          readinessProbe:
            httpGet:
              path: /jenkins/login    # adjust if no prefix
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /jenkins/login
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 20
            failureThreshold: 5

      volumes:
        - name: jenkins-data
          persistentVolumeClaim:
            claimName: jenkins-pvc
        - name: jenkins-casc
          configMap:
            name: jenkins-casc
